<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Giallovision - Sphere Application</title>
    <link rel="stylesheet" type="text/css" href="https://unpkg.com/litegraph.js/css/litegraph.css">
    <style>
        body {
            background-color: #202020;
            margin: 0;
            padding: 0;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        #mycanvas {
            width: 100vw;
            height: 100vh;
            display: block;
        }
    </style>
</head>
<body>

<canvas id="mycanvas"></canvas>

<div id="contactModal" style="display: none; position: fixed; top: 0; left: 0; width: 100vw; height: 100vh; background: rgba(0,0,0,0.85); z-index: 1000; justify-content: center; align-items: center; backdrop-filter: blur(4px);">
    <div style="position: relative; width: 90%; max-width: 650px; background: #1c1c1c; border: 1px solid #333; border-radius: 8px; padding: 25px; box-shadow: 0 10px 30px rgba(0,0,0,0.8);">
        <button id="closeModal" style="position: absolute; top: 15px; right: 15px; background: #ff4444; border: none; color: white; border-radius: 4px; width: 30px; height: 30px; cursor: pointer; font-weight: bold; transition: background 0.2s;">X</button>
        <h2 style="color: #fff; margin-top: 0; font-family: sans-serif;">Open Comms</h2>
        
        <form action="https://formspree.io/f/YOUR_ENDPOINT_ID" method="POST" style="display: flex; flex-direction: column; gap: 15px; margin-top: 20px;">
            
            <label style="color: #ccc; font-size: 14px; font-family: sans-serif;">
                Name:
                <input type="text" name="name" required style="width: 100%; padding: 10px; margin-top: 5px; background: #2b2b2b; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box;">
            </label>

            <label style="color: #ccc; font-size: 14px; font-family: sans-serif;">
                Email:
                <input type="email" name="email" required style="width: 100%; padding: 10px; margin-top: 5px; background: #2b2b2b; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box;">
            </label>

            <label style="color: #ccc; font-size: 14px; font-family: sans-serif;">
                Nature of Inquiry:
                <select name="inquiry_type" required style="width: 100%; padding: 10px; margin-top: 5px; background: #2b2b2b; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box;">
                    <option value="Live Event / V1">Live Event / V1 Video Lead</option>
                    <option value="Generative AI">Generative AI / Media Pipeline</option>
                    <option value="Consulting">Technical Infrastructure / Consulting</option>
                </select>
            </label>

            <label style="color: #ccc; font-size: 14px; font-family: sans-serif;">
                Project Details:
                <textarea name="message" rows="4" required style="width: 100%; padding: 10px; margin-top: 5px; background: #2b2b2b; border: 1px solid #444; color: white; border-radius: 4px; box-sizing: border-box; resize: vertical;"></textarea>
            </label>

            <button type="submit" style="background: #35ff5e; color: #111; font-weight: bold; padding: 12px; border: none; border-radius: 4px; cursor: pointer; margin-top: 10px;">Transmit Message</button>
        </form>
    </div>
</div>

<script src="https://unpkg.com/litegraph.js/build/litegraph.js"></script>
<script type="module" src="./src/main.js"></script>

<script>
    const modal = document.getElementById('contactModal');
    const closeBtn = document.getElementById('closeModal');

    // Close on X button click
    closeBtn.addEventListener('click', () => modal.style.display = 'none');

    // Close when clicking outside the modal box
    modal.addEventListener('click', (e) => {
        if(e.target === modal) modal.style.display = 'none';
    });
</script>
</body>
</html>
